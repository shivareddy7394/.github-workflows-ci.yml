name: CI/CD Pipeline

on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      -  run: pip install -r requirements.txt
      -  run: pytest
      -  run: docker build -t my-app
      -  run: |
           docker run -d -p 5000:5000 my-app
           sleep 5
           curl http://localhost:5000

      
